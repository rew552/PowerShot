<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerShot Viewer</title>
    <style>
        :root {
            --bg-primary: #252526;
            --bg-secondary: #1E1E1E;
            --bg-tertiary: #2D2D30;
            --bg-input: #3C3C3C;
            --fg-primary: #F1F1F1;
            --fg-secondary: #AAAAAA;
            --accent: #50A6E8;
            --accent-hover: #1C97EA;
            --border: #3F3F46;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--fg-primary);
            font-family: 'Segoe UI', 'Yu Gothic UI', Meiryo, sans-serif;
            font-size: 13px;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 250px;
            max-width: 35vw;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .sidebar-header {
            padding: 16px;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #folder-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .folder-item {
            padding: 6px 16px 6px 32px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .folder-item.root-folder {
            padding-left: 16px;
            font-weight: bold;
        }
        .folder-item:hover {
            background-color: var(--bg-tertiary);
        }
        .folder-item.selected {
            background-color: var(--border);
            color: var(--accent);
        }

        /* Main Content */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
            min-height: 0;
        }

        .toolbar {
            height: 50px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }

        .search-box {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--fg-primary);
            padding: 6px 12px;
            border-radius: 4px;
            flex: 1;
            max-width: 300px;
            outline: none;
        }
        .search-box:focus {
            border-color: var(--accent);
        }

        #gallery {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-content: flex-start;
        }

        .thumb-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
            width: 240px;
            display: flex;
            flex-direction: column;
        }
        .thumb-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .thumb-img {
            width: 100%;
            height: 135px; /* 240x135 is exactly 16:9 */
            object-fit: contain;
            display: block;
            border-bottom: 1px solid var(--border);
            background-color: #111;
        }

        .thumb-info {
            padding: 8px;
            font-size: 12px;
        }
        .thumb-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .thumb-date {
            color: var(--fg-secondary);
            font-size: 11px;
        }

        /* Lightbox */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(45,45,48,0.7);
            color: white;
            border: none;
            width: 50px;
            height: 100px;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }
        .lightbox-nav:hover { background: var(--accent); }
        #nav-prev { left: 0; border-radius: 0 8px 8px 0; }
        #nav-next { right: 0; border-radius: 8px 0 0 8px; }

        #lightbox-close {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(45,45,48,0.7);
            color: white; border: none;
            width: 40px; height: 40px;
            border-radius: 50%; font-size: 20px;
            cursor: pointer;
        }
        #lightbox-close:hover { background: #E81123; }

        .lightbox-info {
            margin-top: 16px;
            color: var(--fg-primary);
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header" style="font-size: 15px;">
            <span style="font-family: Consolas, monospace; color: var(--accent); font-weight: bold;">&gt;_</span>
            <span style="color: var(--fg-secondary); font-size: 12px; margin-left: 4px;">PowerShot Viewer</span>
        </div>
        <div id="folder-tree"></div>
    </div>

    <div id="main-content">
        <div class="toolbar">
            <input type="text" id="search-input" class="search-box" placeholder="名前で検索..." autocomplete="off">
            <div id="file-count" style="color: var(--fg-secondary); font-size: 13px; flex: 1;"></div>
            <select id="sort-select" class="search-box" style="flex: 0 0 auto; width: 130px; cursor: pointer;">
                <option value="name-asc" selected>名前 (昇順)</option>
                <option value="name-desc">名前 (降順)</option>
                <option value="newest">新しい順</option>
                <option value="oldest">古い順</option>
            </select>
        </div>
        <div id="gallery"></div>
    </div>

    <div id="lightbox">
        <button id="lightbox-close">✖</button>
        <button id="nav-prev" class="lightbox-nav">❮</button>
        <img id="lightbox-img" src="" alt="">
        <button id="nav-next" class="lightbox-nav">❯</button>
        <div class="lightbox-info" id="lightbox-filename"></div>
    </div>

    <script>
        const FOLDER_DATA = "[[FOLDER_DATA]]";
        let currentFiles = [];
        let currentLightboxFiles = [];

        const folderTree = document.getElementById('folder-tree');
        const gallery = document.getElementById('gallery');
        const searchInput = document.getElementById('search-input');
        const fileCount = document.getElementById('file-count');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxFilename = document.getElementById('lightbox-filename');

        function renderTree(node, container, depth = 0) {
            const item = document.createElement('div');
            item.className = 'folder-item' + (depth === 0 ? ' root-folder' : '');
            if (depth > 0) item.style.paddingLeft = `${16 + depth * 16}px`;
            item.innerHTML = `<span>${depth === 0 ? '🏠' : '📁'}</span> ${node.Name}`;
            
            item.onclick = () => {
                document.querySelectorAll('.folder-item').forEach(el => el.classList.remove('selected'));
                item.classList.add('selected');
                renderGallery(node.Files);
            };

            container.appendChild(item);

            if (node.Children) {
                node.Children.forEach(child => renderTree(child, container, depth + 1));
            }
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function renderGallery(files) {
            currentFiles = files;
            sortGallery();
        }

        function sortGallery() {
            const sortVal = document.getElementById('sort-select').value;
            if (sortVal === 'newest') {
                currentFiles.sort((a, b) => new Date(b.Date) - new Date(a.Date));
            } else if (sortVal === 'oldest') {
                currentFiles.sort((a, b) => new Date(a.Date) - new Date(b.Date));
            } else if (sortVal === 'name-asc') {
                currentFiles.sort((a, b) => a.Name.localeCompare(b.Name));
            } else if (sortVal === 'name-desc') {
                currentFiles.sort((a, b) => b.Name.localeCompare(a.Name));
            }
            filterGallery();
        }
        document.getElementById('sort-select').onchange = sortGallery;

        function filterGallery() {
            const query = searchInput.value.toLowerCase();
            const filtered = currentFiles.filter(f => f.Name.toLowerCase().includes(query));
            
            gallery.innerHTML = '';
            fileCount.textContent = `${filtered.length} files`;

            filtered.forEach((file, index) => {
                const card = document.createElement('div');
                card.className = 'thumb-card';
                card.innerHTML = `
                    <img src="${file.Path}" class="thumb-img">
                    <div class="thumb-info">
                        <div class="thumb-name" title="${file.Name}">${file.Name}</div>
                        <div class="thumb-date">${file.Date} - ${formatBytes(file.Size)}</div>
                    </div>
                `;
                card.onclick = () => openLightbox(filtered, index);
                gallery.appendChild(card);
            });
        }

        searchInput.oninput = filterGallery;

        // Lightbox
        function openLightbox(filesArray, index) {
            currentLightboxFiles = filesArray;
            const file = filesArray[index];
            lightboxImg.src = file.Path;
            lightboxFilename.textContent = `${file.Name} (${file.Date})`;
            lightbox.style.display = 'flex';
            lightbox.dataset.currentIndex = index;
        }

        function navigateLightbox(dir) {
            if (!currentLightboxFiles.length) return;
            let idx = parseInt(lightbox.dataset.currentIndex) + dir;
            if (idx < 0) idx = currentLightboxFiles.length - 1;
            if (idx >= currentLightboxFiles.length) idx = 0;
            openLightbox(currentLightboxFiles, idx);
        }

        document.getElementById('nav-prev').onclick = (e) => { e.stopPropagation(); navigateLightbox(-1); };
        document.getElementById('nav-next').onclick = (e) => { e.stopPropagation(); navigateLightbox(1); };

        function closeLightbox() {
            lightbox.style.display = 'none';
        }

        document.getElementById('lightbox-close').onclick = closeLightbox;
        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };

        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowLeft') navigateLightbox(-1);
                if (e.key === 'ArrowRight') navigateLightbox(1);
            }
        });

        // Init
        let folderDataObj = null;
        try { folderDataObj = typeof FOLDER_DATA === 'string' ? JSON.parse(FOLDER_DATA) : FOLDER_DATA; } catch(e) {}

        if (folderDataObj && folderDataObj.Name) {
            renderTree(folderDataObj, folderTree);
            // Select root by default
            if (folderTree.firstChild) folderTree.firstChild.click();
        }
    </script>
</body>
</html>
